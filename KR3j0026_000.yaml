body:
  text: 資暇集雜家類二雜考之屬提要臣等謹案資暇集三巻唐李匡乂撰舊本或題李濟翁葢宋刻避太祖諱故書其字如唐修晋書稱石虎為石季龍或作李乂亦避諱刋除一字如唐修隋書稱韓擒虎為韓擒實一人也文獻通考一入雜家引書錄解題作李匡文一入小說家引讀書志作李匡義而字濟翁則同陸㳺集有此書䟦亦作李匡文王楙野客叢書作李正文然讀書志實作匡乂諸書傳寫自悞耳匡乂始末未詳書中稱再從叔翁汧公知為李勉從孫又稱宗人瀚作蒙求載蘇武鄭衆事云云則晉翰林學士李瀚之族其人當在唐末唐書藝文志有李匡文兩漢至唐年紀一卷註曰昭宗時宗正少卿葢即匡乂書中但自稱守南漳葢所歴之官非所終之官也讀書志載是書有匡乂自序曰世俗之談類多訛誤雖有見聞嘿不敢證故著此書上篇正誤中篇談原下篇本物此本前有虞山錢遵王氏藏書印葢也是園舊物末題埭川顧氏家塾梓行中間貞字徴字完字皆闕筆葢南來所刋殷字亦尚闕筆則猶刻於理宗以前宣祖未祧之時較近本為善然無此序疑裝緝者佚之書中亦不標三篇之目其所說之事則皆與目應疑自序乃櫽括之詞原未標目也其書大抵考訂舊文黄伯思東觀餘論嘗駁其茶托一條黄朝英緗素襍記嘗駁其儤直一條胡仔苕溪漁隱叢話嘗駁其藥欄一條王楙野客叢書嘗駁其急急如律令一條今觀所辨如千里不唾井事云本因南朝宋之計吏不知玉臺新詠舊本載曹植代劉勲出妻王氏詩已有千里不唾井况乃昔所奉句則宋計吏之說為誤又蜀妓薛濤見於唐人詩集者無不作濤此書獨作薛陶顯為訛字又解龍鍾為龍所踐處亦渉穿鑿又全書均考證之文而穆寕㗖熊白一條忽襍嘲謔襍事於體例尤為不倫然如謂荀悦漢紀防將來之誤角里直書禄里足騐用字上加一拂别作甪字之非謂論語宰予晝寝作畫寝乃梁武帝之說傷人乎不問馬不字斷句乃經典釋文之說均不始於韓愈筆解謂五臣註文選竊據李善之本謂韓愈諱辨誤以杜度為氏謂有母之人不可稱舅氏為渭陽謂作詩疏之陸璣名從玉傍非士衡謂萬幾字訛作機由漢王嘉封事謂除授二字有分以至座前閣下之别竹甲題籖門杖之始皆引證分明足為典據其中鄼侯音鹺一條明焦竑作筆乗摭為異聞不知属沛國者音鹺属南陽者音賛匡乂已引鄒氏史記注駁讀鹺之非竑殆未見此書也歟乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
