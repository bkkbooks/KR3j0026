  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0026_WYG_002-1a, image: WYG0850/WYG0850-0153a.png}
body:
  text: 資暇集卷中唐李匡乂撰甘羅世咸云甘羅十二為秦相大誤也案史記云羅事相吕不韋戰國䇿云為吕不韋庶子因説趙有功始封為上卿不曽為丞相也相秦者是羅祖名茂押牙武職令有押衙之目衙宜作牙此職名非押其衙府也蓋押牙旗者今又有押節者之類是也案兵書云牙旗者將軍之旌故必豎牙旗於門是以史傳咸作牙門字今者押牙既作押衙而牙門亦為衙門乎揚州揚州者以其風俗輕揚故號其州今作楊栁之楊謬也星貨肆有以筐以筥或倚或垂鱗其物以鬻者曰星貨鋪言其列貨叢雜如星之繁今俗呼為星火鋪誤也合醬人間多取正月晦日合醬是日偶不暇為之者則云時已失大誤也案昔者王政趨民正月作醬是日以農事未興之時俾民乘此間隙備一嵗調鼎之用故紿云雷鳴不作醬腹中當鳴所貴今民不於三二月作醬恐奪農事也今不躬耕之家何必以正晦為限亦不須避雷但問菽麴得法否耳座前身卑致書於宗屬近戚必曰座前降几前之一等案座者座於牀也言卑末之使不當授受置其書於所座牀之前俟隙而發不敢直進之意今或貽書中外言座前則以重空前則以輕遂創坐前無義也其字既不居下是使前人坐於地非禮之甚歟不爾直云座字空前可矣至如閣下字案禮云凡諸侯朝覲會遇儐介將命文書不相指斥是以天子則曰陛下太子曰殿下公卿已下曰閣下或云執事足下侍者應劭云此蓋進闕之辭也今無貴賤通書皆云閣下其執事足下不施用矣侍者二字移於道者僧徒山人處士之儔噫豈獨斯一二字乎相借與行路之人諂其富貴至有下慈孝之字斯不當謙奈體何起居又卑致書將結其語云附狀起居狀字下宜加候字也案王肅云起居猶動靜也若不加候字其可但言附狀動靜乎語既不了理遂有乖末吏短啓亦然也不僅又今尺題多云不僅人情僅字訓劣不劣人情是何言歟茍云僅旬僅别則如此之類可用矣不爾交不近人情也彭原公今代多稱故丞相彭原李公謂其子廓曰吾不如爾有令子蓋言廓子畫蚤修辭賦而廓不辨屯毛案劉氏代説張憑父不才憑祖鎮謂憑父曰我不如汝有佳兒時憑僅數歲斂手對曰阿翁詎宜以子戲父好事者見彭原公尚談諧遂移之以資一時之噱而不知小虧丞相之甚其誣厚矣不然者彭原公豈不見張憑之語耶或云是彭原公引舊事以勉廓朝祥今俗釋服多用昏時斯頗非禮按戴記魯人有朝祥而暮歌者子路笑其是日便歌夫子雖抑子路云三年之喪亦已久矣而復曰踰月則其善明知月晦之朝去縞從吉也明日則踰月矣故夫子訝其不待明日而歌斯久是以傷云又多乎哉今之免服凖式給晦日假者蓋以朝既從吉使竟是日吉服盡與親賓相見遍示禮終至明日復參公務無樂不為之義又禮書皆云前一夕除某物又曰夙興云云足知前夕除廢以為明晨之漸凡曰釋服悉宜從朝矣今在脫服假內反不見賓友也禮云大喪不避涕泣而見人者言既不行求見人人來見之不避涕泣以表至哀無飾今見卒哭之後月旦月半以朔望為詞不見親賓遇節復如是出何典歟至有尊髙居喪弔者以是日客多不敢求見遽自告退宜矣若以為辭未敢問命期功之服朔望冬至俗禮外罕安縞素而又公除之後官人以此殿豎囊襆多似為中惜哉辰日辰日不哭前哲非之切矣國朝又有故事誠為不能明矣今抑有孤辰不哭其何云耶成服三日成服之制聖人斷決著在不刋之經無敢踰之矣今或見不詳典禮取信巫師有至五日之僣者夫禮等於天實崇大之事也非小生所宜該但以前序從朝故略舉此見禮記第十八卷出城儀寒食拜掃案開元禮第七十八云昔者宗子去在他國庶子無廟孔子許望墓為壇以時祭祀今之上墓或有慿焉又云主人去塋百步下馬公服無者常服則是吉禮分明矣其上饌與時饗何殊今多白衫麻鞋者衣冠在野與黎庶雷同大錯大誤也且春秋二仲月公卿拜陵並具公服則曰時之例矣又案唐禮凡參辭並是公服故松柏非逺之家每新改授皆見所以示仕祿朱紫之榮釋褐結綬抑亦如之其四時之享布素暫去襴板即可矣若悉白衫麻鞋何以表軒冕耶必申哀敬豈在如斯今或往往仍有自宅便麻衣絲屨而去尤為不可或曰今有復在縗或有巾縞行上墓參辭禮余謹不敢且又新婦參辭且花叉襦袖夫兒郎既衫鞋即須新婦素色淡粧大乖宜也忌日忌日必哀又曰不樂今或其日匿訃不聞哀停喪不成服不面親戚不留尺題抑有前一日晚便絶賓者未知出於何典也代説云前輩人忌日唯不飲酒作樂近之矣然加以不出齊閣飯不葷之疏晨受親戚慰早見不唯别異外賓抑容晝得議事暮當賓朋弔不必黃昏客逺者回也其晝也尺題留而不復親戚來而不拒言不近娛志不離戚斯可謂中禮矣若乃送客挾彈訪人辭酒立時之輩攝祭之流固無足言者至如子就三日之不餐叔治七嵗之至性豈唯不樂必哀所可抑制耶或聞近代有其日焚紙錢既非典禮所載余未之信豹直新官併宿本署曰爆直僉作爆迸之字余常膺悶莫究其端近見惠郎中實云合作武豹字曽有得處偶忘之言豹性潔善服氣雖雪雨霜霧伏而不出慮汚其身自聆所聞每嗟所未見因覽列女傳見陶答子妻所云南山有文豹霧雨七日不下食者欲以澤其毛衣而成文章乃知惠説自此爾小謝詩云雖無玄豹姿終隱南山霧是也南華亦云豹棲於山林伏於嵓穴靜則併宿公署雅是豹伏之義宜作豹直固不疑也引從常憶幼時見在事或三五人同行其中筒笏囊位下卑行者俾前行呵逐開路位髙行尊者得以默而近馬其髙尊之殿乘亦不離馬後蓋饒謙之去就也意者偏遂便於髙尊處今則反是筒笏前引以為尊殿乘訖而無序何耶拜禮夫拜者禮之特所以申敬恭之儀故周禮有稽首頓首振動吉凶竒褒肅九等之拜以示威靈而觀容止也其非至親行卑者拜則接捧示止之不敢當之意今卑謙太過反不敢接捧而鞠躬側立惕受翻令前人得以盡禮深拜又書狀弔慶辭謁並削去拜字以敬尊官都乖古風卜則嫗非卜筮者必話枽道茂之行有嫗一無所知大開小肆自枽而卜回者必曰嫗於枽門賣卜其神乎俾來覆之枽言休則嫗言咎枽言咎則嫗言休顧後中否枽嫗各半或有折話者曰斯管公明門前媪也咸誤矣案符子云齊有好卜者十而中五鄰人不好卜常反之亦十中五與不卜等耳蓋是子家設理之詞後人呼聲而至是愚欲歸實故證之急急如律令符祝之類末句急急如律令者人皆以為如飲酒之律令速去不得滯也一説漢朝每行下文書皆云如律令言非律非令之文書行下當亦如律令故符祝之類末句有如律令之言並非也案律令之令字宜平聲讀為零音若毛詩盧重令之令若人姓令狐氏之令也律令是雷邊捷鬼學者豈不知之此鬼善走與雷相疾速故云如此鬼之疾走也永樂冢永樂坊內古冢今人皆呼為東王公墓有祠堂加其上俗以祈祀稱造化東王公大謬也案韋氏兩京新記云未知姓名時人誤為東方朔墓也當時時人已誤今又轉東方朔為東王公後必更轉為東里子産矣光祿坊內亦有占冢新記不載時人以與永樂者對遂目為王母臺張郎中譙云常於雜鈔中見光祿者是漢朝王陵之墓以西呼為王母所以東呼為王公故附于注蜀馬成都府出小駟以其便於難路號為蜀馬今宣城郡亦有小馬時人皆呼為宣州蜀馬語習不悟良可笑焉有似中宗時時人呼姚丞相為陕州吳兒同州桂麞亦然蹙融今有奕局取一道人行五棊謂之蹙融融宜作戎此戲生於黃帝蹙鞠意在軍戎也殊非圎融之義庾元規著座右方所言蹙戎者今之蹙融也學者固已知之錢戲錢戲有每以四文為一列者即史傳云云所意錢是也俗謂之攤錢亦曰攤鋪其錢不使疊映欺惑也疾道之故訛其音音攤為蠶齕反音鋪為蒲厥義此耳今人書此錢戲率作摴蒱字何貶樗蒱之甚耶案摴蒱起自老子今亦為呼盧者不宜雜其號於錢説攤鋪之義皎然可見寓直常見直宿公署咸云寓直徒以當直字俗稍貴文言而不究其義也案字書寓寄也寓直二字出於潘嶽之為武賁中郎將晉朝未有將校省故寄直散騎省今百官各當本司而直固是當直安可云寓何異坐自居第而稱僑僦也端午端五者案周處風土記仲夏端五烹鶩角黍端始也謂五月初五日也今人多書午字其義無取為余家元和中端五詔書並無作午字處而近見醴泉縣尉廳壁有故光福王相題鄭泉記處云端五日豈三十年端五之義别有見耶俗字俗字至夥芻字已有二草在心今或更加草非也因芻又記得趨走之趨今皆以多居走非也焦下已有火今復更加一火剩也瓜果字皆不假更有加草瓜字已象剖形明矣俗字甚衆不可殫論俗談俗之誤談不可以證者何限今人呼郡刺史為刺史謂般涉為官涉謂茜為塹食魚謂鱖為桂以鱟為詬人振鼻為噴涕吐口為愛富殊不知噴喋噫腑噫者音隘藏府氣噫出尉斗為醖剪刀為箭帽為慕禮為里保為補褒為逋暴為步觸類甚多不可悉數挽歌代云挽歌始自田橫門人非也左傳曰魯哀公會吳伐齊將戰齊將公孫夏令歌虞殯杜注虞殯送葬歌也如是則已有久矣上馬自便服乘馬已來既無帷蓋乃漸至大裁帽席帽之障蔽近年時態唯修虛事至於致恭尊髙不敢戴上馬宜矣直有出門猶露首面如之何資暇集卷中
