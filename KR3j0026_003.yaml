body:
  text: 資暇集卷下唐李匡乂撰非麻胡俗怖嬰兒曰麻胡來不知其源者以為多髯之神而臉刺者非也隋將軍麻祜性酷虐煬帝令開汴河威稜既盛至稚童望風而畏互相恐嚇曰麻祜來稚童語不正轉祜為胡只如憲宗朝涇將郝玭蕃中皆畏憚其國嬰兒啼者以玭怖之則止又武宗朝閭閻孩孺相脅云薛尹来咸類此也况魏志載張文逺遼來之明證乎麻祜廟在睢陽鄜方節度李丕即其後丕為重建碑不反剉諺云千里井不反唾盖由南朝宋之計吏㵼剉殘草於公館井中且自言相去千里豈當重來及其復至熱渇汲水遽飲不憶前所棄草草結於喉而斃俗因相戒曰千里井不反剉復訛為唾爾三臺今之􅟜酒􅀈合作啐啐馳送酒聲音碎今訛以平聲促樂是也故且作􅀈字貴賤近易識爾三十拍促曲名三臺何或曰昔鄴中有三臺石季倫常為㳺宴之地樂工倦怠造此以促飲也一說蔡邕自治書御史累遷尚書三日之間周歴三臺樂府以邕曉音律製此曲動邕心抑希其厚遺亦近之借書借借上子亦反下子夜反書籍俗曰借一癡借二癡索三癡還四癡又案王府新書杜元凱遺其子書曰書勿借人古人云古諺借書一嗤還書二嗤嗤笑也後人更生其詞至三四因訛為癡巻白波飲酒之卷白波義當何起按東漢既擒白波賊戮之如卷席故酒席倣之以快人情氣也龍鍾亟有孔文子之徒下問龍鍾之義且未知所自輙以愚見鍾即涔爾涔與鍾並蹄足所踐處則龍之致雨上下所踐之鍾固淋漓濺澱矣義當止此餘俟該通啑咒今人每啑必自祝所祈云云案邶終風篇注願猶思也言猶我也盖他人思我我則啑之也鄭又稱古遺語每啑云人道我以為他人說我我則啑此正得其願言者非咒願之願非語言之言今則自祝乃由誤解詩句爾阿茶公郡縣主宫禁呼為宅家子盖以至尊以天下為宅四海為家不敢斥呼故曰宅家亦猶陛下之義至公主已下則加子字亦猶帝子也又為阿宅家子阿助詞也急語乃以宅家子為茶子既而亦云阿茶子或削其子遂曰阿家以宅家子為茶子既而亦云阿茶子削其子字遂曰阿茶一說漢魏已来宫中尊美之呼曰大家子今急訛以大為宅焉下俚俗呼下俚家為嘉李家者秦人呼云以俚與國姓音同不敢聮下字呼因改爲嘉下聲逐近亦以家美故也揚聲䘮筵之室俾妓婢唱悲切聲以助主人之哀者謂之揚聲不知起自何代案其嘪嘪然宜呼為羊聲義取報羔羊跪爾不唯助也抑用邀之豈不深乎哉屋頭俗命如厠為屋頭稱并州人咸鑿土為室厠在所居之上故也一說北齊文宣帝怒其魏郡丞崔叔寳以溷汁沃頭後人或食或避親長不能正言溷因影為沃頭焉車輊俚語以車頓前為質者乃由不識輊字故也輊音致詩云如輊如軒前重為輊後重為軒俚見輊字似桎字便以支乙音呼俚語之謬放此者觸類而思從可知矣至如見馬首之低者遂為頭質乃由車質之誤也亦宜云頭輊其義與車同矣竹笪麄籧篨因江東呼為笪今京洛皆呼為竹笪今俗字音笪為怛盖此字音旦又音闥當是有於笪旁書旦闥二音者遂誤合二音反謂是怛遂以成俗余嘗因市此呼作闥音為輕薄所嗤曰真村裏書生余應之曰聲亦呼作旦音知乎若是者又多難悉言驢為衛代呼驢為衛於文字未見今衛地出驢義在斯乎或説以其有䩜有槽譬如諸衛有胃曹也因目為衛自前漢有直廬郎吏居之令則衛士處之至今紫宸宣政殿外皆有廬舍以宿衛士是也奴為邦呼奴為邦者盖舊謂僮僕之未冠者曰豎人不能直言其奴因號奴為豎髙歡東魏用事時相府法曹卒子炎誤犯歡奴杖之歡諱樹而威權傾於鄴下當是郡寮以豎同音因目奴為邦義取邦君樹塞門以句内有樹字假豎為樹故歇後為言今兼刪去君字呼之一說邦字類拜字言奴非唯郎主是賓則拜措大代稱士流為醋大言其峭醋而冠四人之首一說衣冠儼然黎庶望之有不可犯之色犯必有驗比於醋而更驗故謂之焉或云往有士人貧居新鄭之郊以驢負醋巡邑而賣復落魄不調邑人指其醋䭾而號之新鄭多衣冠所居因總被斯號亦云鄭有醋溝士流多居其州溝之東尤多甲族以甲乙叙之故曰醋大愚以為四說皆非也醋宜作措止言其能舉措大事而已抱木南土有木以抱為名者言其輕滿不能成斤亦以造器滿抱如無因以懷抱名之也南土多陂塘多生水松其抱木蹙水沬依松而成似松之疣贅浮繞其株悉去水面三寸原其化徴假松之氣爾故其臭芳其質輕抱木突輕於赤脚誠哉斯言然余為南漳守命工為函匣筒􅔖抑造清明毬卯輕齎而歸北人莫不稱便而異焉薛陶牋松花牋代以為薛陶牋誤也松花牋其來舊矣元和初薛陶尚斯色而好製小詩惜其幅大不欲長賸長之長乃命匠人狭小之蜀中才子既以為便後減諸牋亦如是特名曰薛陶牋今蜀紙有小様者皆是也非獨松花一色稠枽硯稠枽硯始因元和初愚之叔翁宰虢之耒陽邑諸季父温凊之際必訪山水以㳺一日於澗側見一紫石憩息于上佳其色且欲闕隨至遂自勒姓氏年月遂刻成文復無刓缺乃曰不刓不麩可琢為硯矣既就琢一硯而過但惜重大無由出之更行百歩許往往有焉又行乃多至有如拳者不可勝紀遂與從僮挈數拳而出就縣第製斲時有胥性巧請斲之形出甚妙季父每與俱之澗所胥父兄稠枽逆肆人也因季父請解胥藉而歸父兄之業於是來斲開席於大路厥利驟肥土客競効各新其意爰臻諸器焉季父大中壬申嵗授陕今自元和後往還京洛每至稠枽鐫者相率輙有所獻以報其本迄今不怠季父别業在河南福昌邑下至於弟姪市其器稱福李家則價不我賤然則其石以為諸器尤愈於硯石𨫼餅石𨫼餅本曰喭餅同州人好相喭將投公狀必懷此而去用備狴牢之粮後増以甘辛變其名質以為貢遺矣李環餳蘇乳煎之輕餳咸云十年來始有出河中余實知其由此武臣李環家之法也余弱冠前歩月洛之綏福里方見夜作問之云乳餳時新開是肆每斤六十文明日市得而歸不三數月滿洛陽盛𫝊矣開成初余從叔聽之鎮河中自洛招致餳者居於蒲蒲上因有是餳其法寜聞𫝊得唯闕軍人竊得法之十八九故今奉天亦出輕餳然而劣於蒲者不盡其妙焉風爐子以周繞通風也一說形像名烽爐子理亦近焉相思子豆有圎而紅其首烏者舉世呼為相思子即紅豆之異名也其木斜斫之則有文可為彈博局及琵琶槽其樹也大株而白枝葉似槐其花與皂莢花無殊其子若􅀈豆處于甲中通身皆紅李善云其實赤如珊瑚是也甘草所言甘草非國老之藥者乃南方藤名也其叢似薔薇而無刺其葉似夜合而黄細其花淺紫而蕊黄其實亦居甲中以枝葉俱甜故謂之甘草藤土人異呼為草而已出在潮陽而南漳亦有故備載之投子投子者投擲於盤筵之義今或作頭字言其骨頭所成非也因此兼有作骰字者案諸家之書骰即股字爾不音投史記蔡澤說范睢曰博者或欲大投裴注云投瓊也則知以玉石為投擲之義安有頭骰之理哉熊白㗖貞元初穆寜為和州刺史其子故宛陵尚書及給事已下尚未分官列侍寜前時穆氏家法切峻寜命諸子直饌愁不如意則杖之諸子將至直日必探求珍異羅於鼎俎之前競新其味計無不為然而未嘗免笞叱之過者一日給事直饌鼎前有熊白及鹿脩忽曰白肥而脩瘠相滋其宜乎遂同試曰甚異常品即以白裹脩改之而進寜果再飽宛陵與諸季望給事盛形羨色曰非唯免笞兼當受賞給事頗亦自得寜飯訖戒使令曰誰直可與杖俱來於是罰如常數給事將拜杖遽命前曰有此味奚進之晚耶於是聞者笑而𫝊之生肝鏤㔌今縷生肝肚為飯食之一味曰生肝鏤㔌言細切如彫鏤之義一說名生肝虜胙言似胡虜祭之餘胙聲譌故云鏤㔌也凡諸飯食名號字余撰變王子泉僮約并雜字在集中言之詳矣所未該者今之五味詈爚𤓰茄及豬肉俗謂之丑甲音者而臆􅀈􅀈脥字反是字書内字音丑獵者譌呼丑甲反爾此字火旁云下木别有火旁世世下木音士甲反是沸湯渫菜字其音丑獵者義由暗爚也畢羅畢羅者蕃中畢氏羅氏好食此味今字從食非也餛飩以其象渾沌之形不能直書渾沌而食避之從食可矣至如不托言舊未有刀机之時皆掌托烹之刀机既有乃云不托今俗字有餺飥乖之且甚此類頗多推理證辨可也元和中有姦僧鑒虚以羊之大府特造一味𫝊之于今時人不得其名遂以其號目之曰鑒虚今往往俗字又加食旁率多此類也阮咸樂器有似琵琶而圎者曰阮咸大厯中愚之再從叔翁司徒汧公之鎮滑也因與賓客會琹話及斯樂曰往中宗朝元賓客行中為太常少卿時有人於古冢獲其銅鑄成者獻之元曰此阮仲容所造乃命工人木為之音韻清朗頗難為名權以仲容姓名呼焉于今未䝉佳號况阮云昔賢豈可以名氏而號樂器乎其形象月其聲合琴目為月琹宜矣自是知之者不以舊名呼今人以為李崖州在相日所號非也晉書稱阮咸善琵琶此即是也案後周書云武帝彈琵琶後梁宣帝起舞謂武帝曰陛下既彈五絃臣何敢不同百獸則周武所彈乃是今之五絃明知前代凡此之類總號琵琶爾又案風俗通云以手枇杷謂之琵琶自撥彈已後唯今四絃始専琵琶之名因依而言則劉餗所云貞觀中裴洛兒始棄撥用手以指琵琶足是不知故事之言也又因此而徵今之五絃之號即出於後梁宣帝之語也而今阮氏琵琶正以手指反不得古琵琶之名都失本義也琴甲今彈琴或削竹為甲以助食指之聲者亦因汧公也嘗患代指而舊甲方墮新甲未完風景廓澄援琴思泛假甲於竹聊為權用名徳既崇人争倣效好事者且曰司徒甲夫琴韻在乎輕清且竹於自然之甲厚薄剛柔殊矣况棄真用假捨清從濁乎盖靡知其由也至如箜篌之與秦筝若能去假還真其聲宛美矣案中容樂論云絲不如竹竹不如肉桓問孟嘉此義嘉曰以其漸近自然故知甲宜從真矣茶托子始建中蜀相崔寜之女以茶盃無襯病其熨指取楪子承之既啜而盃傾乃以蠟環楪子之央其盃遂定即命匠以漆環代蠟進於蜀相蜀相竒之為製名而話於賓親人人為便用於代是後𫝊者更環其底愈新其製以至百狀焉貞元初青鄆油繒為荷葉形以襯茶椀别為一家之楪今人多云托子始此非也蜀相即今昇平崔家訊則知矣拆封刀子起於郭汾陽書吏也舊但用刀子小者而汾陽雖大度廓落然而有晉陶侃之性動無廢物每収其書皮之右所剺下者以為逐日須取文帖餘悉卷貯每嵗終則散主守家吏俾作一年之簿所剺之處多不端直文帖且又繁積胥吏不暇剪正隨曲斜聮糊一日所由剺刀忽折不餘寸許吏乃銛以應急覺愈於全時漸出新意因削木如半環勢加於折刄之上使纔露鋒榼其書而剺之汾陽嘉其用心曰真郭子儀部吏也言不廢折刄也每話于外後因傳之益妙其製書題籖大僚題上紙籖起於丞相李趙公也元和中趙公權傾天下四方緘翰日滿閽者之袖而潞帥郄士美時有珍獻趙公喜而回章盈幅曲叙殷勤誤卷入振武封内以遣之而振武别紙則附于潞時阿跋光進帥麟覽盈幅手字知誤畫時飛還趙公趙公因命書吏凡有尺題各令籖記以送故于今成風也門狀文宗朝以前無之自朱崖李相貴盛於武宗朝且近代稀有生一品百官無以希取其意以為舊刺輕刺則今之名紙相扇留具銜候起居狀而今又益競以善價紙如出印之字巧諂曲媚猶有未臻之遺恨井丹禰正平生於今日其亦如是乎藥忌醫方云牛膝忌牛肉余好窮物性嘗於冬日以牛肉裹牛膝經旬肉藥俱不敗因知始剏此論意者徒以名類然也即思本草云􅝀茨令人臍下常痛斯堪絶倒若爾則王莽末南方餓甿掘食何不東觀書載其多患脖臍氣乎牛膝之忌當由痔疾不宜食雉肉痔風也偶然此肉發動腸風而病名與􅝀茨同爾席㡌永貞之前組藤為盖曰席㡌取其輕也後或以太薄冬則不禦霜寒夏則不障暑氣乃細色罽代藤曰氊㡌貴其厚也非崇貴莫戴而人亦未尚元和十年六月裴晉公之為臺丞自化理第早朝時青鎮一帥拒命朝廷方參議兵計而晉公預焉二帥俾捷歩張晏等倳刄伺便謀害至里東門導炬之下霜刄歘飛時晉公繄㡌是賴刄不即及而㡌折其簷既脫禍朝貴乃尚之近者布素之士亦皆戴焉折簷㡌尚在裴氏私帑中大和末又染繒而復代罽曰疊綃㡌雖示其妙與氊㡌之庇懸矣㑹昌已来吴人衒巧抑有結絲㡌若網其巧之淫者織花鳥相厠焉近又染藤為紫復以輕相尚被袋非古製不知孰起也比者逺㳺行則用大和九年以十家之累者邐迤竄謫人人皆不自期常虞倉卒之遣每出私第咸備四時服用舊以紐革為腰囊置於殿乘至是服用既繁乃以被易之成俗于今大中已来吴人亦結絲為之或有餉遺豪徒翫而不用也注子偏提元和初酌酒猶用樽杓所以丞相髙公有斟酌之譽雖數十人一樽一杓挹酒而散了無遺滴居無何稍用注子其形若罃而盖觜柄皆具大和九年後中貴人惡其名同鄭注乃去柄安系若茗瓶而小異目之曰偏提論者亦利其便且言柄有礙而屢傾仄今見行用承床近者繩床皆短其倚衡曰折背様言髙不及背之半倚必將仰脊不遑縱亦由中貴人剏意也盖防至尊賜坐雖居私第不敢傲逸其體常習恭敬之儀士人家不窮其意往往取様而製不亦乖乎繩床當作承字言輕齎可随人来去資暇集巻下
