body:
  text: 資暇集卷上唐李匡乂撰車馬有行色今見將首途者多云車馬有行色按莊子稱栁下季逢夫子自盗跖所回云此也意者以其車有塵而馬意殆今有渉逺而來者用此宜矣南華既非僻經咸所觀習奚不根其文意而正其譌歟一本駮其誕歟不拜單于近代浩虚舟作蘇武不拜單于賦爾来童稚時便熟諷詠至於垂白莫悟賦題之誤抑皆詮寫昇在甲等何不詳史漢正𫝊不拜單于是鄭衆非蘇武也余宗人翰蒙求亦明言蘇武持節鄭衆不拜况梁元帝亦著論曰漢世銜命匈奴困而不辱者二人而已子卿手持旄節卧伏氷霜仲師固無下拜隔絶區外學者豈能尚醉而不解醒耶一本無解字行李李字除菓名地名人姓之外更無别訓義也左𫝊行李之往来杜不研窮意理遂注云行李使人也遂俾今見逺行結束次第謂之行李而不悟是行使爾按舊文使字作􅡛𫝊寫之誤誤作李焉舊文使字山下人人下子禄里漢四皓其一號角里角音祿今多以覺音呼乖也是以魏子及孔氏祕記荀氏漢紀慮將来之誤直書禄里可得而明也案玉篇等字書皆云東方為角音龣禄或作角字亦音禄魏子祕記漢紀不書龣而作禄者以其字僻又慮誤音故也以愚所見角是當東方何者案陳留志稱京師亦號為灞上儒生灞既在京之東則角星為東方不疑矣字書言角直宜作龣爾然龣字亦音角角音覺者樂聲也或亦通作䐾角之角字是以今人多亂其音呼之稍留心為學者則妄穿鑿云音禄之角字與音覺之角字㸃畫有分别處又不知角龣各有二音字體皆同而其義有異也又禮記君大夫鬊爪實于緑中鄭司農注云緑當為角聲之誤也既云聲誤是鄭讀角中為禄中禄與緑是雙聲若讀角為覺覺是腭際聲緑是舌頭之聲何以破聲誤之説也注復云角中謂棺内四隅也據此則又似音禄之角與音覺之角義略同矣陸氏釋文孔公正疏不能窮聲盡義亦但云緑當為角何忽後學之甚故愚自讀漢之角里禮之緑中皆作禄音亦豈敢正諸君子耶然好學者幸試詳之客散今見賓旅出主人之門必曰客散孟嘗門但風聞便用不尋其源使主人知其源必惡而不樂矣實為客去就不可不知也此是王右丞維悲府主已没之句上句云秋風正蕭索盖痛其主人殁後同僚皆散其可用乎蟲霜旱潦曲子名并辭飲坐令作有不悟而飲罰爵者皆曰蟲傷旱潦或云蟲傷水旱且以為薄命不偶萬口一音未嘗究四字之意何也蟲傷宜為蟲霜盖言田農水旱之外抑有蟲蝕霜損此四者田農之大害六典言之數矣呼曲子名則下兵為下平閣羅鳳為閤羅鳳著辭則河内王為何柰王檣竿上為長竿上如斯之語豈可殫論生子紿俗生男必紿云女女紿云男意者以其形新魄怯慮鬼物知而逼攝不欲誠告當由髙齊斛律皇后誕女後主茍欲恱后兄光意詐稱生男而大赦後大臣家效之因主失徳不道或以此戯漸至成風今為忌諱乖歟戯源驛京兆昭應縣東有戯源驛案其地在戱水之傍漢書陳渉將周章西入闗至戯蘇林云在新豐東南三十里小顔又云今有戯源驛音平聲人所知也何為舉世皆以去聲呼此驛號彼從徒爾我輩其可終誤哉梅槐叢有似薔薇而異其花葉稍大者時人謂之枚櫰音瓌實語訛强名也當呼為梅槐在灰部韻音回案江陵記云洪亭村下有梅槐樹嘗因梅與槐合生遂以名之今似薔薇者得非分枝條而演𦙍哉至今葉形尚處梅槐之間取此為證不乃近乎且未見梅槐之義也直使便為玫瑰字豈百花中獨珍是耶取象於玫瑰耶玫瑰瑰亦音回不音瓌其瑰字音瓌者是瓊瑰音回者是玫瑰字書有證也藥欄今園亭中藥欄欄即藥藥即欄猶言圍援非花藥之欄也有不悟者以為藤架蔬圃堪作切對是不知其由乖之矣按漢宣帝詔曰池藥未御幸者假與貧民蘇林注云以竹繩連綿為禁藥使人不得往来爾漢書闌入宫禁字多作草下閳則藥欄作藥蘭尤分明易悟也一本無作藥蘭三字月令禮記之月令者今人咸依陸徳明所說云是吕氏春秋十二紀之首後人合為之誤也盖出於周書第七卷周月時訓兩篇蔡邕玉篇云周公所作是也吕紀自采於周書則不得言戴禮取諸吕紀明矣晝寢論語宰子晝寢鄭司農云寢卧息也梁武帝讀為室之寢晝作胡卦反且云當為畫字言其繪畫寢室故夫子嘆朽木不可雕糞土之牆不可杇然則曲為穿鑿也今人罕知其由咸以為韓文公愈所訓解也問馬傷人乎不問馬今亦為韓文公讀不為否言仁者聖之亞聖人豈仁於人不仁於馬故貴人所以前問賤畜所以後問然而乎字下豈更有助詞斯亦曲矣況又非韓公所訓按陸氏釋文已云一讀至不字句絶則知以不為否其来尚矣誠以不為否則宜至乎字句絶不字自為一句何者夫子問傷人乎乃對曰否既不傷人然後問馬又别為一讀豈不愈於陸云乎字辨稷下有諺曰學識何如觀㸃書書之難不唯句度義理兼在知字之正音借音若某字以朱發平聲即為某字發上聲變為某字去入又改為某字轉平上去入易耳知合發不發為難不可盡條舉之今略推一隅至如亡字無字毋字並是正音非借音也今見㸃書每遇亡有字必以朱發平聲其遇毋有亦然是不知亡字亾字毋字母字㸃畫各有區分亡字之亡從一㸃一畫一觀篆文當知矣是以無字正體作亾失之亾中有人毋有字其畫盡通也父母字中有兩㸃劉伯莊音義云凡非父母字之母皆呼為無字是也義見字書其无旡上无下既今多混書陸徳明已有論矣學者幸以三隅反焉可不起予乎非五臣世人多謂李氏立意注文選過為迃繁徒自騁學且不解文意遂相尚習五臣者大誤也所廣徴引非李氏立意盖李氏不欲竊人之功有舊注者必逐毎篇存之仍題元注人之姓字或有迃濶乖謬猶不削去之茍舊注未備或興新意必於舊注中稱臣善以分别既存元注例皆引據李續之雅宜殷勤也代𫝊數本李氏文選有初注成者覆注者有三注四注者當時旋被𫝊寫之其絶筆之本皆釋音訓義注解甚多余家幸而有焉嘗將數本並校不唯注之贍略有異至於科段互相不同無似余家之本該備也因此而量五臣者方悟所注盡從李氏注中出開元中進表反非斥李氏無乃欺心歟且李氏未詳處將欲下筆宜明引憑證細而觀之無非率爾今聊各舉其一端至如西都賦說逰獵云許少施巧秦成力折李氏云許少秦成未詳五臣云昔之㨗人壯士摶格猛獸施巧力折固是捷壯文中自解矣豈假更言況又不知二人所從出乎又注作我上都云上都西京也何大淺近忽易歟必欲加李氏所未注何不云上都者君上所居人所都㑹耶況秦地厥田上上居天下之上乎又輕改前賢文㫖若李氏注云某字或作某字便隨而改之其有李氏不解而自不曉輙復移易今不能繁駮亦略指其所改字曹植樂府云寒鱉炙熊蹯李氏云今之腊肉謂之寒盖韓國事饌尚此法復引鹽鐡論羊淹雞寒劉熙釋名韓羊韓雞為證寒與韓同又李以上句云膾鯉􅀢胎鰕因注詩曰炰鼈膾鯉五臣兼見上句有膾遂改寒鼈為炰鼈以就毛詩之句又子建七啓云寒芳蓮之巢龜膾西海之飛鱗五臣亦改寒為搴搴取也何以對下句之膾耶況此篇全說修事之意獨入此搴字於理甚不安上句既改寒為搴即下句亦宜改膾為取縱一聮稍通亦與諸句不相承接以此言之明子建故用寒字豈可改為炰搴耶斯類篇篇有之學者幸留意乃知李氏絶筆之本懸諸日月焉方之五臣猶虎狗鳳雞耳其改字也至有翩飜對恍惚則獨改翩飜為翩翩與下句不相收又李氏依舊本不避國朝廟諱五臣易而避之宜矣其有李本本作泉及年代字五臣貴有異同改其字却犯國諱豈唯矛楯而已哉杜度世徴名與姓音同者必稱杜度愚或非之曰杜不名度其人則冷哂曰韓文公諱辨亦引之子獨不然妄也愚見其信韓文公如信周孔故不敢與之言歸而自紀曰按篤論云杜伯度名操字伯度善草書曹魏時以其名同武帝故隱而舉字猶蒯通名徹字犯漢武諱稱字通是也後人見其姓杜字伯度遂又削去伯字呼為杜度明知度非名也且篤論是杜恕所著恕亦曹魏時人也與伯度實為一家豈可不信杜篤論之本真而從韓文公之末誤也初學記對初學記月門中以吴牛對魏鵲吴牛以不耐熱見月亦喘然魏鵲者引魏武帝歌行月明星稀烏鵲南飛爲據斯甚疎闊如此則盍言魏烏乎漢武帝秋風詞云秋風起兮白雲飛草木黄落兮鴈南歸今月門既云魏鵲則風事亦用漢鴈矣若是採掇文字何所不可東海徐公碩儒也何乖之甚七歩陳思王七歩之捷用事者移於常人宜矣若襃今朝諸王則大不佳何者七歩所成詩即燃萁煮豆之二十字也細而思之其可當諸王所用哉梁代任昉襃竟陵王行狀云淮南取貴於食時陳思見稱於七歩雖梁人襃王固無忌諱然欠審爾若以諸王為捷幸有十歩事相當而新何不採於後魏耶渭陽徴舅氏事必用渭陽前輩名公往往亦然兹失於識豈可輕相承耶審詩文當悟其不可徵用矣是以齊楊愔㓜時其舅源子恭問讀詩至渭陽未愔便號泣子恭亦對之欷戯又有思戀二字亦不可輕用其義類此故附說之亦見詩矣方寸亂今見他人稍惑撓未決則戯云方寸亂矣此不獨誤也何失言甚歟按蜀志潁川人徐庶從昭烈王率兵南行被曹公追破而庶母為其所虜庶將辭昭烈以詣曹公乃自指心曰本欲與將軍共圗王霸之業以此方寸地耳今母為彼獲方寸亂矣無益於事遂棄蜀入魏茍事不相類其可輕用耶若撰節行倡娃𫝊引用雖非正文其為此事則云善矣緑竹漪漪詩衛淇澳篇云緑竹漪漪按陸璣草木疏稱郭璞云緑竹王芻也今呼為白脚蘋或云即鹿蓐草又云篇竹似小䔧赤莖節韓詩作􅗨音篤亦云􅗨篇竹則明知非笋竹矣今為辭賦皆引漪漪入竹事大誤也當時謝莊竹賛云瞻彼中唐緑竹漪漪便襲其謬殊乖爾按謝賛若佳何不預文選所以為昭明之棄也故盡引陸郭之注疏云陸璣字從玉旁非士衡也愚宗人大著作祝嘗有顯論今祕閣西南廊新碑古人姓名若此叅誤多矣故愚撰十四代蠲疑史目以别白也萬㡬萬㡬字出於尚書臯陶謨兢兢業業一日二日萬㡬也案孔安國云㡬微也言當戒萬事之微也史以晉太宗為丞相時於事動每經年桓温患其稽遲而問對之曰萬㡬那得速耶斯對真得書義近者改為樞機之機豈尚書之前别有所見始未聞也當由漢王嘉奏封事引用誤從木旁也顔氏不引孔注以證又後人不根其本遂相承錯謬且曰漢書尚爾曽不知班顔亦自誤後學也請長纓終軍請長纓今多云將係單于分門書䇿亦然所未喻也按漢書本𫝊云南越與漢和親乃遣軍使南越說其王欲令入朝比内諸侯自請願受長纓必羈南越王而致之闕下斯文甚明何其相承而戾正史耶盖由終軍𫝊内有當發匈奴使軍自請行之處旋又叙請纓事讀者誤合為一叚遂此乖謬矣終軍自請使于匈奴曰臣願盡精厲氣奉佐明使畫吉凶於匈奴之前今將說者宜云終軍請畫吉凶於虜廷不則言請長纓以羈南越王若係單于乃賈誼之事非終軍也按班賛云誼欲試屬國施五餌三表以係單于且非以長纓係之也又按陳思王表云賈誼弱冠求試屬國請係單于之頸而制其命終軍以妙年使越欲得長纓占其王羈致北闕斷可知矣鄼侯漢相蕭何封為鄼侯舉代呼為鹺有呼賛者則反掩口而咥深可訝也鄒氏分明云屬沛郡者音嵯屬南陽者音賛又茂陵書云蕭何國在南陽合二家之說音賛不音鹺明矣司馬貞誠知音賛不能痛為指撣將来而但云字當音賛今多呼為嵯遂使後學見今呼為嵯字咸曰且宜從衆是誤也可歸罪於司馬氏學家自文潁孫檢斐龍駒及小顔之徒皆作賛音即不得云今多呼為嵯矣所以更舉之者貴好學知司馬公之失矣栢臺烏御史臺有栢及烏固在朱博之前也漢書叙朱博請罷大司農復置御史大夫云是時御史府吏舎百餘區井水皆竭又府中列栢樹常有野烏數千棲宿其上晨去暮来號曰朝夕烏烏去不來者數月長老異之盖史言御史大夫之職休廢也井竭烏去後二年朱博為大司空慮乆廢御史大夫職業無以典正法度固請罷所任大司空得為大夫願盡力為百僚率哀帝從之正史甚明今多以為栢自博栽烏自博集職由䝉求朱博烏集而復白家六帖注引不盡然也除授除授二字當路分明今多不能窮審意義俗吏非調選得官者皆自大曰我乃堂除而亦有隨俗語新拜官者曰某乙除某官至有遺賀書題之云送上新除某官以除故乃以詛新官俾除去之也案漢書凡言除其官以除故官就新官而晉宋已降史書既非班馬之筆多不根義理或以拜授為除及載本語則義㫖宛在今聊舉其一如晉王導讓中書監請為三師表云臣乞得除中書監竭誠保傅是也又漢王彭祖每二千石至其國則迎之除舎注云初除所至之舎此注亦須細味之若以初到之舎乃州宅也盖初除替移出之館亭爾以臨歧路故迎之於此除之義明如皎日其可不悟哉今授代無新拜之官者云有除無授唯此語允當其有謂之除書者乃除去前人舊官與新人也徧謝近有因覽授之說問予曰今新拜官非恩薦之地僉申謝禮無乃不誠乎斯甚無謂予曰却是故事劉歆拜黄門侍郎其父向戒曰今若年少得顯處新拜宜皆謝貴人叩頭謹慎戰戰慄慄乃可免也今之徧謝其暗合耶當行學家之教也資暇集卷上
